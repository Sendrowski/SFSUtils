{% set name = "sfsutils" %}
{% set pypi_name = "sfsutils-popgen" %}
{% set version = "0.1.0b1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  # The PyPI distribution is 'sfsutils-popgen' (the 'sfsutils' name is taken on PyPI by an unrelated
  # project); the conda-forge package can still be the clean 'sfsutils'. The import name is 'sfsutils'.
  url: https://pypi.org/packages/source/{{ pypi_name[0] }}/{{ pypi_name }}/{{ pypi_name|replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 107364f0696216d2224471b691b68a11b781fb5e4d7e20cb3816cbf1979f5796

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv
  entry_points:
    - sfsutils = sfsutils.cli:main

requirements:
  host:
    - python >=3.10
    - pip
    - poetry-core
  run:
    - python >=3.10,<3.14
    - matplotlib-base >=3.9
    - seaborn >=0.13.2
    - numpy >=1.24,<3
    - pandas >=2.2.2
    - jsonpickle >=3
    - multiprocess >=0.70.12
    - tqdm >=4.60
    - biopython >=1.84
    - requests >=2.28
    - scipy >=1.13

test:
  imports:
    - sfsutils
  commands:
    - sfsutils --help

about:
  home: https://github.com/Sendrowski/SFSUtils
  license: GPL-3.0-or-later
  license_file: LICENSE
  summary: SFS parsing with site filtration and annotation, from VCF, Zarr, or tree sequences

extra:
  recipe-maintainers:
    - Sendrowski
