# Development environment: the simulation stack used to (re)generate the msprime SFS-validation
# fixtures (msprime + tskit), the analytic two-locus ground truth (phasegen), the test toolchain,
# and the Sphinx/myst-nb docs stack for building and re-executing the reference notebooks.
#
# Create the env, then install the package editable with the optional backends (cyvcf2 comes from
# PyPI, since it is not on conda-forge), run from the repository root:
#   mamba env create -f envs/dev.yaml
#   mamba run -n sfsutils-dev pip install -e ".[vcf,zarr,arg]" bio2zarr phasegen
#   mamba activate sfsutils-dev
name: sfsutils-dev
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # --- simulation / ground-truth SFS for the parser-validation fixtures ---
  - msprime
  - tskit
  # --- optional VCF-Zarr backend ---
  - zarr
  # --- testing ---
  - pytest
  - pytest-xdist
  - pytest-cov
  - pytest-sugar
  # --- docs (build + re-execute notebooks) ---
  - nbconvert
  - sphinx
  - myst-nb
  - sphinx-book-theme
  - sphinx-autodoc-typehints
  - sphinx-copybutton
  - sphinxcontrib-bibtex
  - autodocsumm
