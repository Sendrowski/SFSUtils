# Development environment: the simulation stack used to (re)generate the msprime SFS-validation
# fixtures (msprime + tskit), the analytic two-locus ground truth (phasegen), the test toolchain,
# and the Sphinx/myst-nb docs stack for building and re-executing the reference notebooks.
#
# Development environment: the simulation stack (msprime + tskit) for the SFS-validation fixtures,
# the analytic two-locus ground truth (phasegen), the VCF/VCF-Zarr backends, the test toolchain and
# the Sphinx/myst-nb docs stack. All third-party dependencies are declared here; only the editable
# install of the package itself remains a post-step, since an in-yaml `-e .` resolves the path
# relative to envs/ rather than the repo root and fails. From the repository root:
#   mamba env create -f envs/dev.yaml
#   mamba run -n sfsutils-dev pip install -e .
#   mamba activate sfsutils-dev
name: sfsutils-dev
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  # --- simulation / ground-truth SFS for the parser-validation fixtures ---
  - msprime
  - tskit
  # --- optional VCF-Zarr backend (zarr 3 is a breaking change; match pyproject's <3 pin) ---
  - zarr>=2.17,<3
  # --- testing (>=9.1: caplog attaches to the named 'sfsutils' logger, which has propagate=False) ---
  - pytest>=9.1
  - pytest-xdist
  - pytest-cov
  - pytest-sugar
  # --- docs (build + re-execute notebooks) ---
  - nbconvert
  - sphinx
  - myst-nb
  - sphinx-book-theme
  - sphinx-autodoc-typehints
  - sphinx-copybutton
  - sphinxcontrib-bibtex
  - autodocsumm
  # --- PyPI-only deps: cyvcf2 (VCF backend), bio2zarr (VCF->VCZ), and the phasegen two-locus ground
  #     truth. NOTE: vcztools cannot join this env - it requires zarr>=3 while bio2zarr and sfsutils
  #     pin zarr<3, a hard conflict; the writer/VCZ interop check must run in a separate zarr-3 env. ---
  - pip:
    - cyvcf2
    - bio2zarr
    - phasegen
